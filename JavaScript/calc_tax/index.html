<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消費税の計算</title>
</head>
<body>
        <p>
        <script>
            let price = 120;
            const tax = 1.1;

            document.write(price +"円の税込金額は");
            // ＋で文字列連結できる（フォーマット文字列みたいな感じ）
            document.write((price * tax) + "円です");
        </script>
        </p>
</body>
</html>
