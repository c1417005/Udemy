<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flexbox</title>
    <style>
        .box {
            background-color: aqua;
            padding: 20px;
            flex-basis: 100px;
            /* 横への大きさの指定 */
            
        }

        .container {
            display: flex;
            /* これを設定すると自由な配置ができるようになる。大事。 */
            gap: 10px;
            /* flex-direction:row; */
            /* 並びを設定できるプロパティ */
            /* flex-wrap: wrap; */
            /* 折り返しあり */
            flex-flow: row wrap;
            /* 上二つを同時に設定できるプロパティ */

            justify-content: space-around;
            /* 要素の配置の仕方を設定できる */

            align-items: center;
            height: 100vh;



        }
        .box1{
            height: 300px;
            order: 2;
            flex-grow: 1;
            flex-shrink: 0;
            /* この二つを設定することでメインコンテンツはどんな状態でも必要なだけ
            幅を確保できるようになる */
            flex: 1 0 400px;
            /* grow,shrink,basisの3つを設定できるプロパティ */
        }
        .box2{
            order:3;
        }
        .box3{
            order: 1;
            /* 要素の順番を指定するプロパティ。指定するならすべてに指定する。 */

            align-self: flex-start;
            /* 要素の位置を設定するプロパティ */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box box1">box1</div>
        <!-- クラス属性をスペース区切りで複数持たせる -->
        <div class="box box2">box2</div>
        <div class="box box3">box3</div>
        
    </div>
</body>

</html>
