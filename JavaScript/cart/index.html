<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>いちご: 1000円</p>
    <div>
        <label>個数</label>
        <select id="count">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
    </div>
    <script>
        const countSelector = document.querySelector('#count');
        const price = 1000;
        countSelector.addEventListener('change',() =>{
            let sum = Number(countSelector.value) * price;
            //Numberというオブジェクトを作る
            alert(sum.toLocaleString());
            // htmlのvalue属性を取得する
        })
    </script>
</body>
</html>
