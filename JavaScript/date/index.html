<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const today = new Date();
        // todayはオブジェクト。newはオブジェクトを作るときに使う
        const theYear = today.getFullYear();
        const theMonth = today.getMonth() + 1;//0-11で取得
        const theData = today.getDate();
        document.write('今日は'+ theYear + theMonth + theData +'です')
    </script>
</body>
</html>
