    <title>CSS Grid</title>

            /* repeatで指定することで簡単に書ける */

            /* 可変幅にしたいときfrを使う。この場合、全体を（2+1）分割して、2使うのと1つかう列を設定する。 */

            /* grid-template-rows: 100px 300px; */
            /* 行幅を定義する 1行目100px 2行目300pxの幅にして */
            /* しかし行数はコンテンツ数によるので、あらかじめ行数を設定するのは難しい。 */

            /* 新たに追加されたものの行幅を自動設定できる。こちらで設定するのが多い。 */

            /* autoはその要素そのものの幅（文字の高さなど）をとるという意味。 */

            /* grid-template-rows: minmax(100px,auto) 200px; */
            /* minmaxは例の場合、行幅を最低100pxとり、それをこえたら要素の高さに合わせるという意味。 */

            /* justify-content: center; */
            /* justify-items: start; */

        /* } */ 
        
        .box{
            background-color: #eee;
            border: 1px solid #333;
            padding: 10px;
        }
        /* .box1{
            grid-column: 2/4;
            grid-row: 1/3;
        }
        .box2{
            grid-column: 2/span 1;
            grid-row: 2/4;
        } */
        .box1{
            display: grid;
            
            grid-area:header;
            grid-template-columns: subgrid;
        }
        .box2{
            grid-area:sidebar;
        }
        .box3{
            grid-area:main;
        }
        .box4{
            grid-area: footer;
        }
        .container{
            display: grid;
            grid-template-areas: 
            "header header"
            "sidebar main"
            "footer footer";
            grid-template-columns: 200px 1fr;
            grid-template-rows:100px 1fr 60px;
            height: 100vh;
        }
        .html{
            font-size: 16px;
        }
        h1{
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <h1>CSS Grid</h1>
    <div class = "container">
        <div class = "box box1">
            <div class = "box box1-1">box1-1</div>
            <div class = "box box1-2">box1-2</div>
        </div>

        <div class = "box box2">box2</div>
        <div class = "box box3">box3</div>
        <div class = "box box4">box4</div>
    </div>
</body>
