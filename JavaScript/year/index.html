<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method = 'get'>
      
        <script>
            // let i = 0;
            // //iが後で変わるのでlet
            // while(i<10){
            //     document.write(i+'<br>');
            //     i ++;
            // }
            let html = '<select name = "year" id = "year">';
            const today = new Date();
            const thisYear = today.getFullYear();
            for(let i = thisYear; i<=thisYear+10; i++){
                html += '<option value = " ' + i + '"> '+ i + '年</option>';
            }
            html += '</select>';
            //シングルクォートはjｓのクォート。ダブルクォートはhtmlのクォート
            //複雑な繰り返し（初期化や更新処理が１行でかけない）ときはwhile,簡単なときはfor

            document.querySelector('form').innerHTML = html;
            //フォームタグの中のhtml に 今作ったhtml を代入する。
        </script>
    </form>
</body>
</html>
